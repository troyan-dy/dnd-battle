# nginx: serve the built SPA and reverse-proxy the API + realtime to the backend
# so the browser talks to ONE origin (the REST API then needs no CORS).

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Map uploads can be several MB; the backend caps them at 10 MiB, so allow
    # a little headroom here instead of nginx's 1 MiB default.
    client_max_body_size 12m;

    # REST API (all HTTP endpoints live under /rooms and /invites).
    location /rooms {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /invites {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Realtime (Socket.IO) — long-lived WebSocket, needs the upgrade handshake.
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA client-side routing: any other path falls back to index.html
    # (e.g. /join/{token} is resolved in the browser, not on the server).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
