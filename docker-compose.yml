# docker-compose.yml — run the WHOLE D&D battler with one command.
#
#   docker compose up --build
#
# Brings up Postgres, the backend (FastAPI + Socket.IO; migrates on start), and
# the frontend (Vite SPA served by nginx, which also reverse-proxies the API +
# realtime to the backend so everything is one origin). Then open the app at
# http://localhost:8080 (override with APP_PORT / APP_BASE_URL in .env).
#
# Just the infra (e.g. to run the backend on your host instead):
#   docker compose up postgres
#
# Redis is optional (live BoardState is in-memory per room; Redis is only needed
# when scaling past one server process) and gated behind the "cache" profile:
#   docker compose --profile cache up
#
# Postgres data + uploaded maps persist in a local, git-ignored `./.docker-data/`
# folder (bind mounts). `docker compose down` keeps them; `rm -rf ./.docker-data`
# wipes them.
#
# Values are read from the local `.env` file (see `.env.example`).

services:
  postgres:
    image: postgres:16
    container_name: dnd-battle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dnd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dnd}
      POSTGRES_DB: ${POSTGRES_DB:-dnd_battle}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dnd} -d ${POSTGRES_DB:-dnd_battle}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    image: dnd-battle-backend
    container_name: dnd-battle-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # In-cluster async Postgres URL (asyncpg). Host is the `postgres` service name.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dnd}:${POSTGRES_PASSWORD:-dnd}@postgres:5432/${POSTGRES_DB:-dnd_battle}
      # Public origin the browser hits (used to build invite links AND to allow the
      # Socket.IO handshake). Must match where the frontend is published.
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      SOCKETIO_CORS_ORIGINS: ${APP_BASE_URL:-http://localhost:8080}
      # Uploaded maps live on a named volume so they survive restarts.
      MAP_STORAGE_DIR: /data/maps
    volumes:
      - ./.docker-data/maps:/data/maps
    expose:
      - "8000"
    healthcheck:
      test:
        ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin: the SPA calls the API via relative URLs proxied by nginx.
        VITE_API_BASE_URL: /
    image: dnd-battle-frontend
    container_name: dnd-battle-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"

  redis:
    image: redis:7
    container_name: dnd-battle-redis
    restart: unless-stopped
    profiles: ["cache"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
